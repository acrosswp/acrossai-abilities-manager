name: Plugin Check

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.1'

      - run: composer install --no-dev --prefer-dist --no-progress

      - name: Install @wordpress/env
        run: npm install -g --no-fund @wordpress/env

      # URL-based plugins in wp-env.json trigger a silent-exit-0 bug in
      # @wordpress/env on Node 24.16 (ubuntu-latest ≥ 2026-05-25).
      # Fix: omit plugin-check from plugins array; install via WP-CLI post-boot.
      # Tracking: https://github.com/WordPress/plugin-check-action/issues/579
      - name: Create wp-env config
        run: |
          cat > .wp-env.json << 'EOF'
          {
            "core": null,
            "plugins": [],
            "testsEnvironment": false,
            "mappings": {
              "wp-content/plugins/acrossai-abilities-manager": "."
            }
          }
          EOF

      - name: Start WordPress environment
        run: wp-env start

      - name: Install Plugin Check
        run: wp-env run cli wp plugin install plugin-check --activate

      - name: Run Plugin Check
        run: |
          wp-env run cli wp plugin activate acrossai-abilities-manager
          wp-env run cli wp plugin check acrossai-abilities-manager \
            --include-experimental \
            --exclude-directories=.agents,.claude,.github,.specify,docs,node_modules,scripts,specs,src,tests \
            --exclude-files=.distignore,.editorconfig,.eslintignore,.eslintrc,.gitattributes,.gitignore,.gitmodules,.nvmrc,.prettierignore,.wp-env.json,AGENTS.md,LICENSE.md,README.md,composer.json,composer.lock,eslint.config.js,package.json,package-lock.json,phpcs.xml.dist,phpstan.neon.dist,phpunit.xml.dist,webpack.config.js
