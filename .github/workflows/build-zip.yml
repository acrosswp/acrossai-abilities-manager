name: Build release zip

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
          npm install

      - name: Build plugin
        run: npm run build

      - name: Create release zip
        run: |
          zip -r acrossai-abilities-manager.zip . \
            -x "*.git*" "node_modules/*" "vendor/*" ".github/*" \
            "tests/*" "*.md" "*.json" "*.lock" "composer.json" \
            "package.json" "wp.env.json" ".env*" "build/*"
          mkdir -p releases
          mv acrossai-abilities-manager.zip releases/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: acrossai-abilities-manager
          path: releases/acrossai-abilities-manager.zip
