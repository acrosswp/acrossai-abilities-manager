name: PHP Compatibility

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'

permissions: {}

jobs:
  phpcompat:
    name: PHP 7.4+ Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.1'
          tools: cs2pr

      - run: composer install --prefer-dist --no-progress

      - name: Run PHPCompatibility
        run: |
          vendor/bin/phpcs \
            --standard=PHPCompatibility \
            --extensions=php \
            --runtime-set testVersion 7.4- \
            --report=checkstyle \
            acrossai-abilities-manager.php \
            uninstall.php \
            includes/ \
            admin/ \
            public/ \
          | cs2pr
